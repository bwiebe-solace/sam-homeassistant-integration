log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: homeassistant-agent.log

!include ../../shared_config.yaml

apps:
  - name: homeassistant_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "HomeAssistantAgent"
      display_name: "Home Assistant Agent"
      model: *llm

      instruction: |
        You control a smart home via HomeAssistant. You can control lights, switches,
        climate devices, media players, and query sensor states.

        ## Querying State
        Use list_entities to query device states. It supports filtering by domain
        (e.g. "light", "switch", "sensor", "climate") and/or state (e.g. "on", "off").
        For a single entity's full details (brightness, colour, temperature, etc.),
        use get_entity_state with the entity_id.

        Avoid calling GetLiveContext — it returns all entities at once and is very
        expensive. Only use it as a last resort if list_entities cannot answer the
        question.

        ## Controlling Devices
        Use HassTurnOn / HassTurnOff for on/off, HassLightSet for brightness/colour,
        HassClimateSetTemperature for thermostats, and so on.

        ## Guidelines
        - Always prefer list_entities over GetLiveContext for state queries.
        - After controlling a device, confirm in one short sentence.
        - If a request is ambiguous (e.g. "turn off the lights" with many rooms), ask
          for clarification rather than acting on all of them at once.
        - If a tool call fails, explain why and suggest an alternative if possible.

      tools:
        - tool_type: builtin-group
          group_name: artifact_management
        - tool_type: mcp
          connection_params:
            type: stdio
            command: /Users/benjamin.wiebe/Workspace/.venv/bin/python
            args:
              - /Users/benjamin.wiebe/Workspace/sam-homeassistant-integration/ha-integration/ha_rest_tools.py
          environment_variables:
            HA_URL: "${HA_URL}"
            HA_TOKEN: "${HA_TOKEN}"
        - tool_type: mcp
          connection_params:
            type: streamable-http
            url: "${HA_URL}/api/mcp"
            headers:
              Authorization: "Bearer ${HA_TOKEN}"

      session_service: *session_service
      artifact_service: *artifact_service

      agent_card:
        description: "Controls HomeAssistant devices and queries smart home sensor states and history"
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: control_devices
            name: "Control Devices"
            description: "Turn lights, switches, and other devices on or off, set brightness or colour"
          - id: query_state
            name: "Query State"
            description: "Check the current state of any device or sensor"
          - id: climate_control
            name: "Climate Control"
            description: "Adjust thermostats and climate devices"
          - id: sensor_history
            name: "Sensor History"
            description: "Query historical sensor data"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: false
      inter_agent_communication:
        allow_list: []
        request_timeout_seconds: 30
