log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: webui.log

!include ../../shared_config.yaml

apps:
  - name: sam_webui_gateway
    app_base_path: .
    app_module: solace_agent_mesh.gateway.http_sse.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      session_secret_key: "${SESSION_SECRET_KEY}"
      model: *llm
      artifact_service: *artifact_service
      session_service:
        type: "sql"
        default_behavior: "PERSISTENT"
        database_url: "${WEB_UI_GATEWAY_DATABASE_URL, sqlite:///webui_gateway.db}"
      gateway_id: "sam-webui"
      default_agent_name: "OrchestratorAgent"
      fastapi_host: "0.0.0.0"
      fastapi_port: ${WEBUI_PORT, 8000}
      cors_allowed_origins:
        - "http://localhost:8000"
        - "http://127.0.0.1:8000"

      enable_embed_resolution: true

      system_purpose: >
        You are SAM, a smart home and homelab AI assistant.
        You have access to HomeAssistant for controlling lights, switches, climate,
        media players, and querying sensor states. Be concise and confirm actions
        after completing them. When asked about the state of something, always
        query the current state before responding rather than guessing.

      response_format: >
        Respond clearly and concisely. Use Markdown where it helps readability.
        For device control confirmations, keep responses brief (one sentence).

      frontend_bot_name: "SAM"
      frontend_welcome_message: "Hello. I am SAM. How can I assist you today?"

      frontend_feature_enablement:
        background_tasks: false

      task_logging:
        enabled: false

      speech:
        stt:
          provider: openai
          openai:
            url: "${STT_API_URL, https://api.openai.com/v1/audio/transcriptions}"
            api_key: "${STT_API_KEY}"
            model: "whisper-1"

        tts:
          provider: gemini
          gemini:
            api_key: "${LLM_SERVICE_API_KEY}"
            model: "gemini-2.5-flash-preview-tts"
            default_voice: "Kore"
            language: "en-US"
            voices:
              - "Kore"
              - "Puck"
              - "Zephyr"
              - "Charon"
              - "Fenrir"
              - "Leda"
              - "Aoede"

        speechTab:
          speechToText:
            speechToText: true
            engineSTT: "external"
            languageSTT: "en-US"
          textToSpeech:
            textToSpeech: true
            engineTTS: "external"
            voice: "Kore"
            playbackRate: 1.0
            cacheTTS: true
