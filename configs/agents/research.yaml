log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: research-agent.log

!include ../../shared_config.yaml

apps:
  - name: research_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "ResearchAgent"
      display_name: "Research Agent"
      model: *llm

      instruction: |
        You are a research assistant that finds current, accurate information from the web.
        You excel at answering questions that require up-to-date knowledge — device specs,
        compatibility, news, troubleshooting, prices, how-to guides, and general knowledge.

        ## Search Guidelines

        Use web_search for any question requiring current information:
        - Quick factual questions ("what is the default port for X?")
        - Device/product lookups and compatibility questions
        - Troubleshooting specific errors
        - HA integration documentation and community forum results
        - News, prices, how-to guides

        Call web_search multiple times with refined queries if the first results are
        insufficient.

        ## Citation Rules

        1. ALWAYS call web_search before including [[cite:searchN]] references.
        2. Base your answer on the actual search results, not prior knowledge alone.
        3. Use [[cite:searchN]] (0-indexed) after sentences that reference a result.
        4. Do NOT list sources manually at the end — the UI renders citations automatically.
        5. Do NOT hallucinate or invent citations.

        ## Smart Home Context

        This assistant is part of a smart home system. Common research topics include:
        - HomeAssistant integrations, automations, templates, and YAML configuration
        - Smart home device compatibility and setup guides
        - Network/homelab topics (Proxmox, Pi-hole, Unifi, etc.)
        - IoT protocols: Zigbee, Z-Wave, MQTT, Matter
        - Home energy monitoring and optimisation
        - Troubleshooting HA errors from the error log or automations

        When researching HA-specific topics, prefer results from:
        - home-assistant.io (official docs)
        - community.home-assistant.io (community forum)
        - GitHub issues/discussions for integrations

      tools:
        - tool_type: python
          component_module: agents.tavily.tavily_search
          function_name: web_search
          tool_config:
            tavily_api_key: "${TAVILY_API_KEY}"

        - tool_type: builtin-group
          group_name: artifact_management

      session_service: *session_service
      artifact_service: *artifact_service

      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: "Performs web research to answer questions using current information from the internet. Use for device lookups, troubleshooting, HomeAssistant documentation, news, and any question where up-to-date knowledge matters."
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: web_search
            name: "Web Search"
            description: "Web search for current facts, device specs, troubleshooting, documentation, and news"

      agent_card_publishing:
        interval_seconds: 60
      agent_discovery:
        enabled: false
      inter_agent_communication:
        allow_list: []
        request_timeout_seconds: 300
