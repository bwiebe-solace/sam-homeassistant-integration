log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: house-status-report.log

!include ../../shared_config.yaml

apps:
  - name: house_status_report_workflow
    app_base_path: .
    app_module: solace_agent_mesh.workflow.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      name: "HouseStatusReport"
      display_name: "House Status Report"

      max_workflow_execution_time_seconds: 120
      default_node_timeout_seconds: 60

      workflow:
        version: "1.1.0"
        description: |
          Queries the current state of the smart home and sends a formatted
          status summary via a Home Assistant notify service. Covers lights,
          climate, media players, and notable switches.

        input_schema:
          type: object
          properties:
            notify_service:
              type: string
              description: >
                HA notify service to deliver the summary (e.g. notify.mobile_app_phone).
                Use notify.persistent_notification to show it in the HA UI.
          required: [notify_service]

        output_schema:
          type: object
          properties:
            confirmation:
              type: string
              description: "Confirmation that the notification was sent"
          required: [confirmation]

        nodes:
          - id: send_report
            type: agent
            agent_name: "HomeAssistantAgent"
            input:
              notify_service: "{{workflow.input.notify_service}}"
            instruction: |
              Compile a concise house status report and deliver it as a notification.

              Step 1 — gather status:
              Query these domains in order: light, climate, media_player, switch.
              For each, use list_entities to find active/on devices.
              Organise the results into clear categories; omit empty categories.
              Ignore all infrastructure, network, and diagnostic entities.
              Use friendly names only — no raw entity IDs.

              Step 2 — send notification:
              Call call_service with:
                domain: the part of notify_service before the dot
                  (e.g. "notify" from "notify.mobile_app_phone")
                service: the part after the dot
                  (e.g. "mobile_app_phone" from "notify.mobile_app_phone")
                service_data:
                  title: "House Status"
                  message: <the formatted summary from step 1>

              Step 3 — confirm:
              Return a brief confirmation that the notification was sent and
              to which service.
            output_schema_override:
              type: object
              properties:
                confirmation:
                  type: string
                  description: "One-sentence confirmation of what was sent and where"
              required: [confirmation]

        output_mapping:
          confirmation: "{{send_report.output.confirmation}}"

        skills:
          - id: house_status
            name: "House Status"
            description: "Compiles a smart home status summary and sends it via a notify service"
            tags: ["status", "overview", "notify"]

      session_service: *session_service
      artifact_service: *artifact_service

      agent_card_publishing: { interval_seconds: 10 }
      agent_discovery: { enabled: true }
