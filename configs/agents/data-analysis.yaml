log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: data-analysis-agent.log

!include ../../shared_config.yaml

apps:
  - name: data_analysis_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "DataAnalysisAgent"
      display_name: "Data Analysis Agent"
      model: *llm

      instruction: |
        You analyse HomeAssistant sensor history data and produce structured analysis
        results and visualisations. You receive raw time-series data and determine
        what it means — patterns, anomalies, active periods.

        ## Input Format
        All analysis tools accept a `data` parameter: a JSON string containing an
        array of {state, last_changed} objects, exactly as returned by the
        HomeAssistant agent's get_entity_history tool:
          [{"state": "0.42", "last_changed": "2024-03-10T08:00:00+00:00"}, ...]

        ## Workflow
        1. Always call analyze_timeseries first. It returns a dtype (numeric or
           categorical), descriptive statistics, and a pattern_hint that tells you
           which deeper tool to use next.

        2. Based on the pattern_hint and the user's goal:
           - Appliance detection (washer, dryer, pump, TV on/off) →
             detect_active_periods — returns run list + recommended_threshold
           - Sensor health or unusual spikes → detect_anomalies
           - Time-of-day habits or weekly patterns → find_daily_patterns

        3. Always generate at least one chart using generate_chart. Choose the
           chart_type that best fits the analysis:
           - timeseries: default for most queries; pass the threshold if one was
             detected
           - histogram: useful alongside anomaly detection
           - heatmap: best for weekly pattern overview
           - daily_pattern: best for hourly routine questions

        ## Saving Charts
        When generate_chart returns a result with a base64_png field, immediately
        save it as an artifact:
          - Use the save_artifact tool
          - Set content_type to "image/png"
          - Use the suggested_artifact_name from the result as the artifact name
          - Include the artifact reference in your response so the user can view it

        ## Output Contract
        Always include a structured JSON summary in your response alongside any
        prose. This allows the Orchestrator and HA agent to act on the results
        programmatically. The summary should contain:
          - analysis_type: one of "active_periods" | "anomalies" | "daily_patterns" | "overview"
          - entity_label: the entity being analysed
          - key_findings: list of 2–5 concise bullet strings
          - numeric_results: the most actionable numbers (e.g. threshold, run_count,
            total_active_hours, peak_hours, anomaly_count)
          - chart_artifact: the artifact name, if a chart was saved

        ## Scope
        You analyse data and return results. You do NOT create HomeAssistant
        automations, scripts, or helpers — return the analysis results and
        recommended values (e.g. threshold) so the Orchestrator can delegate
        those steps to the HomeAssistant agent.

        ## Guidelines
        - If the data array is empty or has fewer than 10 data points, report this
          clearly rather than attempting analysis.
        - For numeric data with a very small range (max–min < 1% of mean), note that
          the sensor appears to be stable and suggest anomaly detection.
        - Round all threshold and statistical values to 4 decimal places in your
          prose to keep the response readable.
        - If asked to analyse multiple entities, call analyze_timeseries for each
          before proceeding to deeper tools.

      tools:
        - tool_type: builtin-group
          group_name: artifact_management
        - tool_type: mcp
          connection_params:
            type: stdio
            command: /Users/benjamin.wiebe/Workspace/sam-homeassistant-integration/.venv/bin/python
            args:
              - /Users/benjamin.wiebe/Workspace/sam-homeassistant-integration/data-analysis/data_analysis_tools.py

      session_service: *session_service
      artifact_service: *artifact_service

      agent_card:
        description: "Analyses HomeAssistant sensor history data to detect active periods, anomalies, and daily usage patterns; generates charts"
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: pattern_detection
            name: "Pattern Detection"
            description: "Find when an appliance or device is running based on sensor history"
          - id: anomaly_detection
            name: "Anomaly Detection"
            description: "Detect sensor values outside the normal range"
          - id: daily_patterns
            name: "Daily Patterns"
            description: "Discover typical time-of-day usage patterns from sensor history"
          - id: data_visualization
            name: "Data Visualisation"
            description: "Generate charts from sensor history data"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: false
      inter_agent_communication:
        allow_list: ["OrchestratorAgent"]
        request_timeout_seconds: 120
